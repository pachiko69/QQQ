<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場購物檢查清單</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f7fafc; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #276749; text-align: center; margin-bottom: 15px; font-size: 24px; }
        
        .header-bar {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px;
        }
        .market-select { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        select, input { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
        .total-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #c6f6d5; padding: 12px 15px; border-radius: 8px;
            font-size: 18px; font-weight: bold; color: #22543d;
        }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #38a169; color: white; }
        .btn-secondary { background: #4a5568; color: white; }
        .btn-blue { background: #3182ce; color: white; }
        .btn-orange { background: #dd6b20; color: white; }
        .add-section {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px;
        }
        .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .add-row select, .add-row input { flex: 1; min-width: 100px; }
        .list-section { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        
        .item-card {
            padding: 12px 15px; border-bottom: 1px solid #edf2f7;
            display: flex; flex-direction: column; gap: 8px;
        }
        .item-card:last-child { border-bottom: none; }
        .item-main { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .item-name { font-weight: 600; color: #2d3748; font-size: 16px; }
        .item-name a { color: #3182ce; text-decoration: none; margin-left: 8px; font-size: 12px; }
        .item-name a:hover { text-decoration: underline; }
        
        .item-detail { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 14px; color: #4a5568; }
        .item-detail input { width: 80px; padding: 5px 8px; }
        
        .status-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .status-btn { padding: 5px 10px; font-size: 12px; border: 1px solid #cbd5e0; background: white; border-radius: 4px; cursor: pointer; }
        .status-btn.active-pending { background: #e2e8f0; color: #2d3748; border-color: #a0aec0; }
        .status-btn.active-purchased { background: #c6f6d5; color: #22543d; border-color: #68d391; }
        .status-btn.active-out_of_stock { background: #fed7d7; color: #742a2a; border-color: #fc8181; }
        .status-btn.active-too_expensive { background: #feebc8; color: #744210; border-color: #f6ad55; }
        .history-price { font-size: 12px; color: #718096; }
        .item-delete { color: #e53e3e; cursor: pointer; font-size: 12px; }
        .status-purchased { background: #f0fff4; }
        .status-out_of_stock { background: #fff5f5; }
        .status-too_expensive { background: #fffaf0; }
        .action-bar {
            display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;
        }
        .empty-tip { text-align: center; padding: 30px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 市場購物檢查清單</h1>
        <div class="header-bar">
            <div class="market-select">
                <label>選擇市場：</label>
                <select id="marketSelect" onchange="onMarketChange()">
                    <option value="">請選擇市場</option>
                </select>
                <button class="btn btn-blue" onclick="newList()">開新清單</button>
            </div>
            <div class="total-bar">
                <span>本次購買總計</span>
                <span id="totalPrice">$0</span>
            </div>
        </div>
        <div class="add-section">
            <div class="add-row">
                <select id="productSelect">
                    <option value="">選擇商品加入清單</option>
                </select>
                <input type="number" id="addQty" value="1" min="0.1" step="0.1" style="width:80px;">
                <button class="btn btn-primary" onclick="addItem()">加入清單</button>
            </div>
        </div>
        <div class="list-section" id="itemList">
            <div class="empty-tip">尚未加入商品，請從上方選擇商品加入購物清單</div>
        </div>
        <div class="action-bar">
            <button class="btn btn-primary" onclick="checkout()">💳 結帳</button>
            <button class="btn btn-orange" onclick="saveToHistory()">📊 加入歷史價格</button>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";

        // 單例初始化全域客戶端，徹底解決重複宣告錯誤
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        // 簡化別名，後續全部使用 window.supabaseClient
        const getSupabase = () => window.supabaseClient;

        let currentListId = localStorage.getItem('currentListId') || null;
        let currentMarketId = null;
        let products = [];
        let items = [];
        const statusLabels = {
            pending: '待購買',
            purchased: '已購買',
            out_of_stock: '缺貨中',
            too_expensive: '太貴了'
        };

        // 初始化
        async function init() {
            await loadMarkets();
            await loadProducts();
            if (currentListId) {
                await loadCurrentList();
            }
        }

        async function loadMarkets() {
            const { data } = await getSupabase()
                .from('mar_markets')
                .select('*')
                .order('name');
            const sel = document.getElementById('marketSelect');
            sel.innerHTML = '<option value="">請選擇市場</option>' + 
                data.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        async function loadProducts() {
            const { data } = await getSupabase()
                .from('mar_products')
                .select('*')
                .order('name');
            products = data || [];
            const sel = document.getElementById('productSelect');
            sel.innerHTML = '<option value="">選擇商品加入清單</option>' + 
                products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        function onMarketChange() {
            currentMarketId = document.getElementById('marketSelect').value;
        }

        async function newList() {
            const marketId = document.getElementById('marketSelect').value;
            if (!marketId) { alert('請先選擇市場'); return; }
            
            const { data, error } = await getSupabase()
                .from('mar_shopping_lists')
                .insert({ market_id: marketId, status: 'active' })
                .select().single();
            
            if (error) { alert('建立失敗: ' + error.message); return; }
            
            currentListId = data.id;
            localStorage.setItem('currentListId', currentListId);
            currentMarketId = marketId;
            items = [];
            renderList();
            updateTotal();
        }

        async function loadCurrentList() {
            const { data: listData } = await getSupabase()
                .from('mar_shopping_lists')
                .select('*')
                .eq('id', currentListId)
                .maybeSingle();
            
            if (!listData) {
                currentListId = null;
                localStorage.removeItem('currentListId');
                return;
            }
            currentMarketId = listData.market_id;
            document.getElementById('marketSelect').value = listData.market_id;
            const { data: itemData } = await getSupabase()
                .from('mar_shopping_items')
                .select('*')
                .eq('list_id', currentListId)
                .order('created_at');
            
            items = itemData || [];
            renderList();
            updateTotal();
        }

        async function addItem() {
            if (!currentListId) {
                alert('請先點擊「開新清單」建立購物清單');
                return;
            }
            const productId = document.getElementById('productSelect').value;
            const qty = parseFloat(document.getElementById('addQty').value) || 1;
            if (!productId) { alert('請選擇商品'); return; }
            const product = products.find(p => p.id === productId);
            
            // 查詢歷史價格
            const { data: history } = await getSupabase()
                .from('mar_price_history')
                .select('price')
                .eq('product_id', productId)
                .eq('market_id', currentMarketId)
                .order('purchase_date', { ascending: false })
                .limit(1);
            
            const refPrice = history && history.length > 0 ? history[0].price : (product.default_price || 0);
            const { data, error } = await getSupabase()
                .from('mar_shopping_items')
                .insert({
                    list_id: currentListId,
                    product_id: productId,
                    product_name: product.name,
                    quantity: qty,
                    price: refPrice,
                    status: 'pending'
                })
                .select().single();
            
            if (error) { alert('加入失敗: ' + error.message); return; }
            
            items.push(data);
            document.getElementById('productSelect').value = '';
            document.getElementById('addQty').value = '1';
            renderList();
            updateTotal();
        }

        async function updateItemStatus(itemId, status) {
            const { error } = await getSupabase()
                .from('mar_shopping_items')
                .update({ status })
                .eq('id', itemId);
            
            if (error) return;
            const item = items.find(i => i.id === itemId);
            if (item) item.status = status;
            renderList();
            updateTotal();
        }

        async function updateItemField(itemId, field, value) {
            const { error } = await getSupabase()
                .from('mar_shopping_items')
                .update({ [field]: value })
                .eq('id', itemId);
            
            if (error) return;
            const item = items.find(i => i.id === itemId);
            if (item) item[field] = value;
            updateTotal();
        }

        async function deleteItem(itemId) {
            if (!confirm('確定移除此商品？')) return;
            const { error } = await getSupabase()
                .from('mar_shopping_items')
                .delete()
                .eq('id', itemId);
            
            if (error) return;
            items = items.filter(i => i.id !== itemId);
            renderList();
            updateTotal();
        }

        function updateTotal() {
            const total = items
                .filter(i => i.status === 'purchased')
                .reduce((sum, i) => sum + (parseFloat(i.price) * parseFloat(i.quantity)), 0);
            document.getElementById('totalPrice').textContent = '$' + total.toFixed(2);
        }

        async function getHistoryPrice(productId) {
            const { data } = await getSupabase()
                .from('mar_price_history')
                .select('price, purchase_date')
                .eq('product_id', productId)
                .eq('market_id', currentMarketId)
                .order('purchase_date', { ascending: false })
                .limit(1);
            return data && data.length > 0 ? data[0] : null;
        }

        async function renderList() {
            const container = document.getElementById('itemList');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-tip">尚未加入商品，請從上方選擇商品加入購物清單</div>';
                return;
            }
            let html = '';
            for (const item of items) {
                const product = products.find(p => p.id === item.product_id);
                const history = await getHistoryPrice(item.product_id);
                const statusClass = item.status !== 'pending' ? `status-${item.status}` : '';
                
                html += `
                <div class="item-card ${statusClass}">
                    <div class="item-main">
                        <div class="item-name">
                            ${item.product_name}
                            ${product && product.url ? `<a href="${product.url}" target="_blank">🔗 官網</a>` : ''}
                        </div>
                        <span class="item-delete" onclick="deleteItem('${item.id}')">✕ 移除</span>
                    </div>
                    ${history ? `<div class="history-price">歷史參考價：$${history.price} (${history.purchase_date})</div>` : ''}
                    <div class="item-detail">
                        <span>數量：<input type="number" step="0.1" value="${item.quantity}" 
                            onchange="updateItemField('${item.id}', 'quantity', this.value)"></span>
                        <span>單價：<input type="number" step="0.01" value="${item.price}" 
                            onchange="updateItemField('${item.id}', 'price', this.value)"></span>
                        <span>小計：$${(parseFloat(item.price) * parseFloat(item.quantity)).toFixed(2)}</span>
                    </div>
                    <div class="status-btns">
                        <button class="status-btn ${item.status === 'pending' ? 'active-pending' : ''}" 
                            onclick="updateItemStatus('${item.id}', 'pending')">待購買</button>
                        <button class="status-btn ${item.status === 'purchased' ? 'active-purchased' : ''}" 
                            onclick="updateItemStatus('${item.id}', 'purchased')">已購買</button>
                        <button class="status-btn ${item.status === 'out_of_stock' ? 'active-out_of_stock' : ''}" 
                            onclick="updateItemStatus('${item.id}', 'out_of_stock')">缺貨中</button>
                        <button class="status-btn ${item.status === 'too_expensive' ? 'active-too_expensive' : ''}" 
                            onclick="updateItemStatus('${item.id}', 'too_expensive')">太貴了</button>
                    </div>
                </div>
                `;
            }
            container.innerHTML = html;
        }

        async function checkout() {
            const purchasedItems = items.filter(i => i.status === 'purchased');
            if (purchasedItems.length === 0) {
                alert('尚無已購買的商品');
                return;
            }
            const total = purchasedItems.reduce((sum, i) => sum + (parseFloat(i.price) * parseFloat(i.quantity)), 0);
            
            const { error } = await getSupabase()
                .from('mar_shopping_lists')
                .update({ total_price: total, status: 'completed' })
                .eq('id', currentListId);
            
            if (error) { alert('結帳失敗: ' + error.message); return; }
            
            alert(`結帳完成！本次總花費：$${total.toFixed(2)}`);
        }

        async function saveToHistory() {
            const purchasedItems = items.filter(i => i.status === 'purchased');
            if (purchasedItems.length === 0) {
                alert('尚無已購買的商品可存入歷史');
                return;
            }
            const records = purchasedItems.map(i => ({
                product_id: i.product_id,
                market_id: currentMarketId,
                price: i.price,
                quantity: i.quantity,
                purchase_date: new Date().toISOString().split('T')[0]
            }));
            const { error } = await getSupabase()
                .from('mar_price_history')
                .insert(records);
            
            if (error) { alert('存入失敗: ' + error.message); return; }
            alert('已成功存入歷史價格記錄！下次購物時可參考');
        }

        init();
    </script>
</body>
</html>
