<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>連結管理後台</title>
<style>
body{background:#e2e8f0;padding:24px;font-family:system-ui,sans-serif;}
.wrap{max-width:900px;margin:0 auto;}
h1{font-size:24px;font-weight:bold;margin-bottom:24px;}
.form-box{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px #00000015;margin-bottom:24px;}
.form-item{margin-bottom:16px;}
input,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-top:4px;}
.row-two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.btn-save{background:#22c55e;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;}
.btn-reset{background:#9ca3af;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin-left:8px;}
.list-item{background:#fff;padding:16px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.btn-edit{background:#60a5fa;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;margin:0 4px;}
.btn-hide{background:#f59e0b;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;margin:0 4px;}
.btn-del{background:#ef4444;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;margin:0 4px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <h1>連結管理後台</h1>

  <div class="form-box">
    <input type="hidden" id="editId">
    <div class="row-two">
      <div class="form-item">
        <label>網頁標題</label>
        <input type="text" id="title" placeholder="請輸入標題">
      </div>
      <div class="form-item">
        <label>排序數字</label>
        <input type="number" id="sort" placeholder="數字越小越前面">
      </div>
    </div>
    <div class="form-item">
      <label>封面圖片網址</label>
      <input type="text" id="img" placeholder="圖片連結">
    </div>
    <div class="row-two">
      <div class="form-item">
        <label>前台網址</label>
        <input type="text" id="frontUrl" placeholder="前台連結">
      </div>
      <div class="form-item">
        <label>後台網址</label>
        <input type="text" id="adminUrl" placeholder="後台連結">
      </div>
    </div>
    <div class="form-item">
      <label>網頁介紹</label>
      <textarea id="desc" rows="4" placeholder="填寫網站簡介"></textarea>
    </div>
    <div>
      <button class="btn-save" onclick="saveLink()">儲存資料</button>
      <button class="btn-reset" onclick="resetForm()">清空表單</button>
    </div>
  </div>

  <div id="adminList"></div>
</div>
                    
<script>
const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadAdminList(){
  const {data,error} = await client.from('qqq_links').select('*').order('sort_num');
  if(error){
    alert('載入失敗：'+error.message);
    return;
  }
  const list = data || [];
  const box = document.getElementById('adminList');
  box.innerHTML = '';
  list.forEach(item=>{
    box.innerHTML += `
    <div class="list-item">
      <div>
        <strong>${item.title}</strong>
        <p style="font-size:13px;color:#666;margin:4px 0;">排序:${item.sort_num}｜狀態:${item.is_show?'顯示':'隱藏'}</p>
      </div>
      <div>
        <button class="btn-edit" onclick="editItem(${JSON.stringify(item).replace(/"/g,'&quot;')})">編輯</button>
        <button class="btn-hide" onclick="changeShow(${item.id},${!item.is_show})">切換顯示</button>
        <button class="btn-del" onclick="delItem(${item.id})">刪除</button>
      </div>
    </div>
    `
  })
}

async function saveLink(){
  const id = document.getElementById('editId').value;
  const postData = {
    title:document.getElementById('title').value,
    description:document.getElementById('desc').value,
    cover_image:document.getElementById('img').value,
    front_url:document.getElementById('frontUrl').value,
    admin_url:document.getElementById('adminUrl').value,
    sort_num:Number(document.getElementById('sort').value)||0,
    updated_at:new Date()
  };
  let res;
  if(id){
    res = await client.from('qqq_links').update(postData).eq('id',id);
  }else{
    res = await client.from('qqq_links').insert(postData);
  }
  if(res.error){
    alert('儲存失敗：'+res.error.message);
    return;
  }
  resetForm();
  loadAdminList();
  alert('儲存成功');
}

function editItem(obj){
  document.getElementById('editId').value = obj.id;
  document.getElementById('title').value = obj.title || '';
  document.getElementById('desc').value = obj.description || '';
  document.getElementById('img').value = obj.cover_image || '';
  document.getElementById('frontUrl').value = obj.front_url || '';
  document.getElementById('adminUrl').value = obj.admin_url || '';
  document.getElementById('sort').value = obj.sort_num || 0;
}

function resetForm(){
  document.getElementById('editId').value='';
  document.getElementById('title').value='';
  document.getElementById('desc').value='';
  document.getElementById('img').value='';
  document.getElementById('frontUrl').value='';
  document.getElementById('adminUrl').value='';
  document.getElementById('sort').value='';
}

async function changeShow(id,status){
  await client.from('qqq_links').update({is_show:status}).eq('id',id);
  loadAdminList();
}

async function delItem(id){
  if(!confirm('確認刪除此筆資料？'))return;
  await client.from('qqq_links').delete().eq('id',id);
  loadAdminList();
}

loadAdminList();
</script>
</body>
</html>
