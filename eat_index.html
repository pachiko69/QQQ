<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食地圖 - 主儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .card { transition: transform 0.2s; } .card:hover { transform: scale(1.02); }
        .checkbox-item:hover { background-color: #f3f4f6; }
        #contextSearch { position: fixed; display: none; z-index: 1000; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 12px; width: 300px; border: 1px solid #e5e7eb; }
        #contextSearch input { width: 100%; padding: 8px 12px; border: 2px solid #3b82f6; border-radius: 6px; outline: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-600 p-4 text-white shadow-lg relative z-50">
        <div class="container mx-auto flex flex-wrap justify-between items-center">
            <h1 class="text-2xl font-bold">美食地圖 🍜</h1>
            <button id="menu-toggle" class="block md:hidden focus:outline-none hover:text-gray-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
            <div id="menu-links" class="hidden w-full md:flex md:w-auto md:space-x-4 mt-4 md:mt-0 flex-col md:flex-row space-y-2 md:space-y-0">
                <a href="eat_index.html" class="block px-3 py-2 md:py-1 rounded bg-blue-500 font-bold">首頁</a>
                <a href="eat_categories.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">分類管理</a>
                <a href="eat_regions.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">地區管理</a>
                <a href="eat_establishments.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">店家管理</a>
                <a href="eat_records.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">品嚐記錄</a>
                <a href="eat_backup.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">資料備份</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <section class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4">搜尋美食</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">關鍵字搜尋 (桌機可按滑鼠"右鍵"，手機點右下角搜尋鈕)</label>
                    <input type="text" id="searchKeyword" placeholder="搜尋店家名稱、地址、特色..." class="border p-2 rounded w-full">
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">地區篩選</label><select id="filterRegion" class="border p-2 rounded w-full"><option value="">所有地區</option></select></div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
                <button onclick="fetchData()" class="w-full sm:w-auto bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 font-bold shadow-md transition duration-200">執行搜尋</button>
                <button onclick="clearSearch()" class="w-full sm:w-auto bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-bold transition duration-200">清空搜尋</button>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold text-blue-600">美食分類篩選 (可多選)</label>
                <div id="filterCategoryCheckboxes" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-9 gap-1 p-4 border rounded-md bg-blue-100"></div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-md"><h2 class="text-xl font-semibold mb-4 border-b pb-2">📊 分類統計</h2><div id="categoryStats" class="grid grid-cols-2 gap-x-8 gap-y-2"></div></div>
            <div class="bg-white p-6 rounded-lg shadow-md"><h2 class="text-xl font-semibold mb-4 border-b pb-2">📍 地區統計</h2><div id="regionStats" class="grid grid-cols-2 gap-x-8 gap-y-2"></div></div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">推薦店家</h2><span id="resultCount" class="text-gray-500 font-medium"></span></div>
            <div id="establishmentList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <!-- 懸浮及右鍵搜尋框 -->
    <div id="contextSearch">
        <label class="block text-xs font-bold text-blue-600 mb-2 uppercase tracking-wider">快速關鍵字模糊搜尋</label>
        <input type="text" id="contextSearchInput" placeholder="輸入關鍵字後按 Enter...">
    </div>
    <!-- 手機版懸浮搜尋按鈕 -->
    <button id="mobileSearchBtn" class="md:hidden fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-lg z-50 focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </button>

    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function() { document.getElementById('menu-links').classList.toggle('hidden'); });

        const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() { await Promise.all([loadCategories(), loadRegions()]); fetchData(); setupContextSearch(); }

        function setupContextSearch() {
            const contextSearch = document.getElementById('contextSearch'); const contextInput = document.getElementById('contextSearchInput'); const mobileBtn = document.getElementById('mobileSearchBtn');
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault(); contextSearch.style.display = 'block'; contextSearch.style.left = `${e.clientX}px`; contextSearch.style.top = `${e.clientY}px`; contextSearch.style.transform = 'none'; contextSearch.style.width = '300px';
                const rect = contextSearch.getBoundingClientRect();
                if (rect.right > window.innerWidth) contextSearch.style.left = `${window.innerWidth - rect.width - 10}px`;
                if (rect.bottom > window.innerHeight) contextSearch.style.top = `${window.innerHeight - rect.height - 10}px`;
                clearSearch(); contextInput.value = ''; contextInput.focus();
            });
            if (mobileBtn) {
                mobileBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); contextSearch.style.display = 'block'; contextSearch.style.left = '50%'; contextSearch.style.top = '50%'; contextSearch.style.transform = 'translate(-50%, -50%)'; contextSearch.style.width = '85%';
                    clearSearch(); contextInput.value = ''; contextInput.focus();
                });
            }
            contextInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (contextInput.value.trim()) { document.getElementById('searchKeyword').value = contextInput.value.trim(); fetchData(); window.scrollTo(0, document.body.scrollHeight); }
                    contextSearch.style.display = 'none';
                } else if (e.key === 'Escape') contextSearch.style.display = 'none';
            });
            document.addEventListener('click', (e) => {
                if (!contextSearch.contains(e.target) && e.target !== mobileBtn && !mobileBtn?.contains(e.target)) { contextSearch.style.display = 'none'; contextSearch.style.transform = 'none'; contextSearch.style.width = '300px'; }
            });
        }

        async function loadCategories() {
            const { data } = await supabaseClient.from('eat_categories').select('*').order('sort_order').order('name');
            document.getElementById('filterCategoryCheckboxes').innerHTML = data.map(cat => `<label class="checkbox-item flex items-center space-x-2 p-2 rounded cursor-pointer"><input type="checkbox" name="filterCategories" value="${cat.id}" class="w-4 h-4 rounded text-blue-600"><span>${cat.name}</span></label>`).join('');
            window.allCategories = data;
        }
        async function loadRegions() {
            const { data } = await supabaseClient.from('eat_regions').select('*').order('sort_order').order('name');
            data.forEach(reg => document.getElementById('filterRegion').add(new Option(reg.name, reg.id)));
        }

        async function fetchData() {
            const keyword = document.getElementById('searchKeyword').value, region = document.getElementById('filterRegion').value, selectedCats = Array.from(document.querySelectorAll('input[name="filterCategories"]:checked')).map(cb => cb.value);
            let query = supabaseClient.from('eat_establishments').select('*, eat_regions(name)');
            if (keyword) {
                const matchedCatIds = window.allCategories.filter(cat => cat.name.toLowerCase().includes(keyword.toLowerCase())).map(cat => cat.id);
                let orCond = `name.ilike.%${keyword}%,address.ilike.%${keyword}%,feature_recommendation.ilike.%${keyword}%,notes.ilike.%${keyword}%`;
                if (matchedCatIds.length) orCond += `,category_ids.ov.{${matchedCatIds.join(',')}}`;
                query = query.or(orCond);
            }
            if (selectedCats.length) query = query.overlaps('category_ids', selectedCats);
            if (region) query = query.eq('region_id', region);
            
            const { data } = await query;
            document.getElementById('resultCount').innerText = `找到 ${data.length} 家店家`;
            document.getElementById('establishmentList').innerHTML = data.length ? data.map(item => `
                <div class="card bg-white rounded-lg shadow-md overflow-hidden flex flex-col h-full"><div class="relative"><img src="${item.image_urls[0] || 'https://placehold.co/400x200?text=No+Image'}" class="w-full h-48 object-cover"><div class="absolute top-2 right-2 flex flex-wrap gap-1 justify-end">${(item.category_ids || []).map(id => { const cat = window.allCategories.find(c => c.id === id); return cat ? `<span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full shadow-sm">${cat.name}</span>` : ''; }).join('')}</div></div><div class="p-4 flex-grow"><h3 class="text-xl font-bold mb-2 text-gray-800">${item.name}</h3><p class="text-sm text-gray-600 mb-2 flex items-center">📍 ${item.eat_regions?.name || '未分類'}</p><p class="text-gray-600 text-sm mb-4 line-clamp-2 min-h-[2.5rem]">${item.address || '暫無地址'}</p><div class="flex justify-between items-center pt-4 border-t"><span class="text-blue-600 font-bold text-sm">${item.phone || '無電話'}</span><a href="eat_establishment_detail.html?id=${item.id}" class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-blue-100">詳情</a></div></div></div>
            `).join('') : '<div class="col-span-full text-center py-10 text-gray-500">找不到符合的店家</div>';
            
            const catCounts = {}, regCounts = {};
            data.forEach(item => {
                if (item.category_ids?.length) item.category_ids.forEach(id => { const cat = window.allCategories.find(c => c.id === id)?.name || '未分類'; catCounts[cat] = (catCounts[cat] || 0) + 1; }); else catCounts['未分類'] = (catCounts['未分類'] || 0) + 1;
                const reg = item.eat_regions?.name || '未分類'; regCounts[reg] = (regCounts[reg] || 0) + 1;
            });
            document.getElementById('categoryStats').innerHTML = Object.keys(catCounts).length ? Object.entries(catCounts).map(([n, c]) => `<div class="flex justify-between border-b py-1 px-2"><span>${n}</span><span class="font-bold text-blue-600">${c}</span></div>`).join('') : '暫無';
            document.getElementById('regionStats').innerHTML = Object.keys(regCounts).length ? Object.entries(regCounts).map(([n, c]) => `<div class="flex justify-between border-b py-1 px-2"><span>${n}</span><span class="font-bold text-green-600">${c}</span></div>`).join('') : '暫無';
        }
        function clearSearch() { document.getElementById('searchKeyword').value = ''; document.getElementById('filterRegion').value = ''; document.querySelectorAll('input[name="filterCategories"]').forEach(cb => cb.checked = false); fetchData(); }
        init();
    </script>
</body>
</html>
