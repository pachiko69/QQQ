<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店家詳情 - 美食地圖</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style> .menu-image { transition: transform 0.3s; } .menu-image:hover { transform: scale(1.05); } </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-600 p-4 text-white shadow-lg relative z-50">
        <div class="container mx-auto flex flex-wrap justify-between items-center">
            <h1 class="text-2xl font-bold">美食地圖 🍜</h1>
            <button id="menu-toggle" class="block md:hidden focus:outline-none hover:text-gray-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
            <div id="menu-links" class="hidden w-full md:flex md:w-auto md:space-x-4 mt-4 md:mt-0 flex-col md:flex-row space-y-2 md:space-y-0">
                <a href="eat_index.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">首頁</a>
                <a href="eat_categories.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">分類管理</a>
                <a href="eat_regions.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">地區管理</a>
                <a href="eat_establishments.html" class="block px-3 py-2 md:py-1 rounded bg-blue-500 font-bold">店家管理</a>
                <a href="eat_records.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">品嚐記錄</a>
                <a href="eat_backup.html" class="block px-3 py-2 md:py-1 rounded hover:bg-blue-700 transition">資料備份</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-5xl">
        <button onclick="history.back()" class="mb-6 flex items-center text-blue-600 hover:text-blue-800 font-bold transition">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            返回列表
        </button>

        <div id="loading" class="text-center py-20 text-gray-500"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>正在載入...</div>
        <div id="content" class="hidden">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-8">
                <div class="md:flex">
                    <div class="md:w-1/3 bg-gray-200"><img id="mainImage" src="" class="w-full h-full object-cover min-h-[300px]"></div>
                    <div class="md:w-2/3 p-6 sm:p-8">
                        <div class="flex flex-wrap gap-2 mb-4" id="categoryTags"></div>
                        <h1 id="estName" class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-2"></h1>
                        <p id="estRegion" class="text-lg text-blue-600 font-semibold mb-6 flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg><span></span></p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8 text-gray-700">
                            <div class="flex items-start"><span class="font-bold w-20 sm:w-24 flex-shrink-0">📍 地址：</span><span id="estAddress"></span></div>
                            <div class="flex items-start"><span class="font-bold w-20 sm:w-24 flex-shrink-0">📞 電話：</span><span id="estPhone"></span></div>
                            <div class="flex items-start"><span class="font-bold w-20 sm:w-24 flex-shrink-0">⏰ 時間：</span><span id="estHours"></span></div>
                            <div class="flex items-start"><span class="font-bold w-20 sm:w-24 flex-shrink-0">🔗 網址：</span><a id="estWebsite" href="#" target="_blank" class="text-blue-600 hover:underline break-all">前往</a></div>
                            <div class="flex items-start"><span class="font-bold w-20 sm:w-24 flex-shrink-0">📑 菜單：</span><a id="estMenuLink" href="#" target="_blank" class="text-blue-600 hover:underline break-all">前往</a></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-400">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-yellow-700">特色推薦</h2>
                    <p id="estRecommendation" class="text-gray-700 whitespace-pre-wrap"></p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-gray-400">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-gray-700">店家備註</h2>
                    <p id="estNotes" class="text-gray-700 whitespace-pre-wrap"></p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md mb-8">
                <h2 class="text-xl font-bold mb-6 border-b pb-2">🖼️ 菜單圖片</h2>
                <div id="menuImages" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md mb-8">
                <div class="flex justify-between items-center mb-6 border-b pb-2">
                    <h2 class="text-xl font-bold">😋 品嚐記錄</h2>
                    <a href="eat_records.html" class="text-sm text-blue-600 hover:underline font-bold">新增記錄 +</a>
                </div>
                <div id="tastingRecords" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function() {
            document.getElementById('menu-links').classList.toggle('hidden');
        });

        const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const estId = new URLSearchParams(window.location.search).get('id');

        async function init() {
            if (!estId) return window.location.href = 'eat_index.html';
            try {
                const [estResult, catResult] = await Promise.all([
                    supabaseClient.from('eat_establishments').select('*, eat_regions(name)').eq('id', estId).single(),
                    supabaseClient.from('eat_categories').select('*')
                ]);
                const est = estResult.data;
                document.getElementById('estName').innerText = est.name;
                document.getElementById('estRegion').querySelector('span').innerText = est.eat_regions?.name || '未設定';
                document.getElementById('estAddress').innerText = est.address || '暫無資料';
                document.getElementById('estPhone').innerText = est.phone || '暫無資料';
                document.getElementById('estHours').innerText = est.opening_hours || '暫無資料';
                document.getElementById('estRecommendation').innerText = est.feature_recommendation || '無';
                document.getElementById('estNotes').innerText = est.notes || '無';
                if(est.website_url) document.getElementById('estWebsite').href = est.website_url; else document.getElementById('estWebsite').removeAttribute('href');
                if(est.menu_url) document.getElementById('estMenuLink').href = est.menu_url; else document.getElementById('estMenuLink').removeAttribute('href');
                
                document.getElementById('categoryTags').innerHTML = (est.category_ids||[]).map(id => {
                    const cat = catResult.data.find(c => c.id === id); return cat ? `<span class="bg-blue-100 text-blue-700 text-sm px-3 py-1 rounded-full font-bold">${cat.name}</span>` : '';
                }).join('');
                
                const images = est.image_urls || [];
                document.getElementById('mainImage').src = images[0] || 'https://placehold.co/600x400?text=No+Image';
                document.getElementById('menuImages').innerHTML = images.length ? images.map(url => `<a href="${url}" target="_blank" class="block overflow-hidden rounded-lg shadow-sm border"><img src="${url}" class="menu-image w-full h-32 object-cover"></a>`).join('') : '<p class="col-span-full text-gray-400">暫無圖片</p>';
                
                await loadTastingRecords();
                document.getElementById('loading').classList.add('hidden'); document.getElementById('content').classList.remove('hidden');
            } catch (e) { alert(e.message); }
        }

        async function loadTastingRecords() {
            const { data } = await supabaseClient.from('eat_tasting_records').select('*').eq('establishment_id', estId).order('tasting_date', { ascending: false });
            document.getElementById('tastingRecords').innerHTML = data.length ? data.map(record => `
                <div class="border rounded-lg p-4 bg-gray-50"><div class="flex justify-between"><div><span class="text-sm font-bold">${record.tasting_date}</span><div class="text-yellow-500">${'⭐'.repeat(record.overall_rating)}</div></div><span class="text-xl font-bold text-blue-600">$${record.amount_spent}</span></div><div class="font-bold">菜品：${record.dishes_ordered||'無'}</div><div class="text-sm italic">${record.notes||''}</div></div>
            `).join('') : '<p class="text-gray-400">尚無記錄</p>';
        }
        init();
    </script>
</body>
</html>
