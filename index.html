<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>多連結展示平台</title>
<style>
*{box-sizing:border-box;}
body{background:#f3f4f6;margin:0;font-family:system-ui,sans-serif;}
.container{max-width:1200px;margin:0 auto;padding:40px 16px;}
h1{text-align:center;font-size:30px;font-weight:bold;margin-bottom:40px;}
.grid-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 10px #00000014;padding:20px;}
.card-img{width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:16px;}
.card-title{font-size:18px;font-weight:bold;margin:0 0 12px;}
.card-desc{color:#666;margin:0 0 24px;line-height:1.6;}
.btn-group{display:flex;gap:12px;}
.btn{flex:1;text-align:center;padding:10px;border-radius:6px;text-decoration:none;color:#fff;border:none;cursor:pointer;}
.btn-front{background:#3b82f6;}
.btn-admin{background:#f43f5e;}
.empty-tip{text-align:center;color:#999;font-size:18px;padding:60px 0;}

/* 新增版權區樣式 */
.footer-copyright {
  width: 100%;
  padding: 30px 0;
  margin-top: 60px;
  text-align: center;
}
.studio-btn {
  background: #1f2937;
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s;
}
.studio-btn:hover {
  background: #374151;
}

/* 彈窗遮罩樣式 */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* 彈窗內容樣式 */
.modal-content {
  background: #fff;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
  padding: 30px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  position: relative;
}
.modal-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #1f2937;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 10px;
}
.modal-text {
  line-height: 1.8;
  color: #4b5563;
  margin-bottom: 15px;
}
.close-modal {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 24px;
  cursor: pointer;
  color: #6b7280;
  background: none;
  border: none;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <h1>~快快快~ 網站展示平台</h1>
  <div id="linkList" class="grid-row"><div class="empty-tip">載入中...</div></div>
</div>

<!-- 新增版權區域 -->
<div class="footer-copyright">
  <button class="studio-btn" id="studioBtn">快快快工作室</button>
</div>

<!-- 彈窗結構 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <button class="close-modal" id="closeModal">&times;</button>
    <h3 class="modal-title">快快快工作室</h3>
    <p class="modal-text"><strong>公司簡介：</strong><br>
      快快快工作室成立於2026年，專注於網站開發、系統建置與數位行銷服務，秉持著高效、專業、創新的理念，為客戶打造優質的數位產品與解決方案。
    </p>
    <p class="modal-text"><strong>連絡方式：</strong><br>
      📞 聯繫電話：0932-740558 (同LINE ID)<br>
      📧 電子郵件：tjc@ms2.hinet.net<br>
      🏠 公司地址：高雄市鼓山區鼓山二路69號
    </p>
    <p class="modal-text"><strong>營業時間：</strong><br>
      週一至週五 09:00 - 18:00（國定假日休息）
    </p>
  </div>
</div>

<script>   
const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function getLinks(){
  const {data, error} = await client
    .from('qqq_links')
    .select('*')
    .eq('is_show',true)
    .order('sort_num',{asc:true});
    
  if(error){
    console.error('讀取失敗',error);
    document.getElementById('linkList').innerHTML = '<div class="empty-tip">連線失敗，請確認金鑰與資料庫權限</div>';
    return;
  }
  const list = Array.isArray(data) ? data : [];
  renderList(list);
}

function renderList(list){
  const box = document.getElementById('linkList');
  if(list.length === 0){
    box.innerHTML = '<div class="empty-tip">暫無展示網站</div>';
    return;
  }
  box.innerHTML = '';
  list.forEach(item=>{
    let img = item.cover_image || 'https://picsum.photos/400/220';
    let desc = item.description || '暫無網站介紹';
    box.innerHTML += `
    <div class="card">
      <img class="card-img" src="${img}" alt="">
      <h2 class="card-title">${item.title}</h2>
      <p class="card-desc">${desc}</p>
      <div class="btn-group">
        <a href="${item.front_url}" target="_blank" class="btn btn-front">前台入口</a>
        <a href="${item.admin_url}" target="_blank" class="btn btn-admin">後台入口</a>
      </div>
    </div>
    `
  })
}

// 彈窗相關功能
const studioBtn = document.getElementById('studioBtn');
const modalOverlay = document.getElementById('modalOverlay');
const closeModal = document.getElementById('closeModal');

// 打開彈窗
studioBtn.addEventListener('click', () => {
  modalOverlay.style.display = 'flex';
});

// 關閉彈窗函式
function closeModalFunc() {
  modalOverlay.style.display = 'none';
}

// 點擊關閉按鈕關閉彈窗
closeModal.addEventListener('click', closeModalFunc);

// 點擊遮罩層關閉彈窗
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) {
    closeModalFunc();
  }
});

// 按下ESC鍵關閉彈窗（額外優化）
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
    closeModalFunc();
  }
});

getLinks();
</script>
</body>
</html>
