<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食地圖 - 分類管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">美食地圖 🍜</h1>
            <div class="space-x-4">
                <a href="eat_index.html" class="hover:underline">首頁</a>
                <a href="eat_categories.html" class="underline font-bold">分類管理</a>
                <a href="eat_regions.html" class="hover:underline">地區管理</a>
                <a href="eat_establishments.html" class="hover:underline">店家管理</a>
                <a href="eat_records.html" class="hover:underline">品嚐記錄</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="bg-white p-6 rounded-lg shadow-md max-w-2xl mx-auto">
            <h2 class="text-xl font-semibold mb-4">新增/編輯美食分類</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <input type="hidden" id="categoryId">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">分類名稱</label>
                    <input type="text" id="categoryName" placeholder="例如：韓式、日式" class="border p-2 rounded w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">排序 (數字越小越前面)</label>
                    <input type="number" id="categorySortOrder" value="0" class="border p-2 rounded w-full">
                </div>
                <div class="md:col-span-3 flex gap-4">
                    <button id="saveBtn" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">儲存</button>
                    <button id="cancelBtn" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">取消</button>
                </div>
            </div>

            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2 text-left">分類名稱</th>
                        <th class="border p-2 text-center w-24">排序</th>
                        <th class="border p-2 text-center w-32">操作</th>
                    </tr>
                </thead>
                <tbody id="categoryTable">
                    <!-- 分類列表 -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://nllzyoxyeycqjqaregxx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbHp5b3h5ZXljcWpxYXJlZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTc2ODQsImV4cCI6MjA5NzkzMzY4NH0.l-LlBNKY57Gwv6VbT1LXEmTKG5V0kNe9veUXHHYAI2M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchCategories() {
            const { data, error } = await supabaseClient.from('eat_categories').select('*').order('sort_order').order('name');
            if (error) return alert(error.message);
            const tbody = document.getElementById('categoryTable');
            tbody.innerHTML = data.map(cat => `
                <tr>
                    <td class="border p-2">${cat.name}</td>
                    <td class="border p-2 text-center">${cat.sort_order}</td>
                    <td class="border p-2 text-center">
                        <button onclick="editCategory('${cat.id}', '${cat.name}', ${cat.sort_order})" class="text-blue-500 hover:underline mr-2">編輯</button>
                        <button onclick="deleteCategory('${cat.id}')" class="text-red-500 hover:underline">刪除</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveCategory() {
            const id = document.getElementById('categoryId').value;
            const name = document.getElementById('categoryName').value;
            const sort_order = parseInt(document.getElementById('categorySortOrder').value) || 0;
            if (!name) return alert('請輸入名稱');

            let result;
            if (id) {
                result = await supabaseClient.from('eat_categories').update({ name, sort_order }).eq('id', id);
            } else {
                result = await supabaseClient.from('eat_categories').insert([{ name, sort_order }]);
            }

            if (result.error) alert(result.error.message);
            else {
                resetForm();
                fetchCategories();
            }
        }

        async function deleteCategory(id) {
            if (!confirm('確定要刪除嗎？相關店家的分類將被清除。')) return;
            const { error } = await supabaseClient.from('eat_categories').delete().eq('id', id);
            if (error) alert(error.message);
            else fetchCategories();
        }

        function editCategory(id, name, sort_order) {
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categorySortOrder').value = sort_order;
            document.getElementById('saveBtn').innerText = '更新';
        }

        function resetForm() {
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categorySortOrder').value = 0;
            document.getElementById('saveBtn').innerText = '儲存';
        }

        fetchCategories();

        document.getElementById("saveBtn").addEventListener("click", saveCategory);
        document.getElementById("cancelBtn").addEventListener("click", resetForm);
    </script>
</body>
</html>
